<!DOCTYPE html>
  <html>
    <body>
      <h1>JavaScript "this"</h1>
      <p>
        The "this" keyword can represent different objects depending where the
        function was called from.
      </p>
      <p>
        Click the button to execute the "hello" function again, and you will see
        that this time "this" represents the button object.
      </p>

      <button id="btn">Click Me!</button>

      <p id="demo"></p>

      <script>
        const hello = function () {
          document.getElementById("demo").innerHTML += "<br>This is: " + this;
        };

        //The window object calls the function:
        window.addEventListener("load", hello);

        //A button object calls the function:
        document.getElementById("btn").addEventListener("click", hello);
      </script>
    </body>
  </html>
</DOCTYPE>
